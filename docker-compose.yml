services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-dev
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  pgsql:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-dev
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-dev
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - app-network

  node:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-node
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app-network

volumes:
  pgsql-data:
  vendor:
  node_modules:

networks:
  app-network:
    driver: bridge
